# ROS-MQTT Bridge Configuration
# ──────────────────────────────
# This file defines how ROS 1 topics map to LUCID MQTT topics.
# Edit this file to match your robot's ROS topic layout.
#
# msg_type format: "package/MessageType" (standard ROS 1 convention)
#   e.g. "geometry_msgs/Twist", "nav_msgs/Odometry", "sensor_msgs/LaserScan"

node_name: lucid_ros_bridge

# Optional shell scripts to source before importing rospy.
# Scripts are sourced in order in a single bash process, then the resulting
# environment is merged into the running component process. Relative paths are
# resolved relative to this ros_bridge.yaml file.
# Example:
# setup_scripts:
#   - /opt/ros/noetic/setup.bash
#   - ./ws/devel/setup.bash
setup_scripts: []

# ── Roslaunch management ────────────────────────────────────────────────
# Optional: configure a roslaunch file to be managed by this component.
# All fields appear in the MQTT cfg topic and args can be updated via cfg/set.
# The cmd/roslaunch_start command uses these as defaults (payload overrides).
#
# Example:
# roslaunch:
#   package: my_robot_bringup
#   launch_file: bringup.launch
#   args:
#     robot_ip: "10.0.0.1"
#     camera_enabled: "true"
roslaunch:
  package: ""
  launch_file: ""
  args: {}

# ── Auto-discovery ──────────────────────────────────────────────────────
# When true, the bridge queries the ROS master at startup for all published
# topics and automatically bridges them (subscribe + publish).
# Explicit ros_subscriptions/ros_publishers below are merged in and take
# priority over discovered entries for the same topic.
auto_discover: true
# Maximum number of publishers auto_discover is allowed to register.
# If the ROS master returns more topics than this limit, the component
# fails at startup with an error. Raise the limit or add noisy topics
# to exclude_topics. Default: 50.
max_auto_discover_publishers: 50

# Maximum telemetry payload size in bytes. If a serialised ROS message exceeds
# this limit the publish is skipped and a warning is logged. Prevents EMQX's
# default 1 MB broker limit from being violated by binary topics (e.g.
# sensor_msgs/Image, sensor_msgs/PointCloud2).
# Set to null (default) for no limit.
max_telemetry_payload_bytes: null

# ── Watchdog ────────────────────────────────────────────────────────────
# The watchdog runs only while the component is ROS-active (after cmd/start_ros).
# Each tick it verifies that subscribers are still receiving messages and that
# every cfg'd publisher is registered. Dead subscribers are recreated when the
# topic still has publishers; missing publishers are recreated unconditionally.
watchdog_interval_s: 5.0
# A subscription is considered dead when no callback has fired for this many
# seconds AND the ROS master still lists publishers for the topic. Tune lower
# for high-rate topics; raise for low-rate / event-driven ones.
subscriber_stale_threshold_s: 10.0

# ── Display (optional) ──────────────────────────────────────────────────
# When set, roslaunch / rosbag subprocesses inherit DISPLAY=<value> so tools
# like rviz or cv_imshow can render windows on the local Xorg server.
# Leave null for headless agents.
# Example: display: ":0"
display: null

# Topics to skip during auto-discovery. Only used when auto_discover is true.
# Example:
# exclude_topics:
#   - /rosout
#   - /rosout_agg
#   - /clock
exclude_topics: []

# ── Explicit mappings ───────────────────────────────────────────────────
# These are always bridged regardless of auto_discover.
# When auto_discover is true, these override any discovered entry for the
# same ROS topic (e.g. to use a custom telemetry_metric name).

# ROS topics → LUCID telemetry
# Each entry subscribes to a ROS topic and forwards messages as LUCID telemetry.
# The telemetry appears at: lucid/agents/{agent_id}/components/ros_bridge/telemetry/{metric}
ros_subscriptions: []
  # - ros_topic: /odom
  #   msg_type: nav_msgs/Odometry
  #   telemetry_metric: odom

  # - ros_topic: /battery_state
  #   msg_type: sensor_msgs/BatteryState
  #   telemetry_metric: battery

# LUCID commands → ROS topic publishes
# Each entry registers a LUCID command that, when received, publishes to a ROS topic.
# Send commands to: lucid/agents/{agent_id}/components/ros_bridge/cmd/{command}
# Payload format:   {"request_id": "...", "data": {<ros message fields>}}
ros_publishers: []
  # - ros_topic: /cmd_vel
  #   msg_type: geometry_msgs/Twist
  #   command: cmd_vel
